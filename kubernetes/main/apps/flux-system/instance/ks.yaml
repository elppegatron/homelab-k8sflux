---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-instance
spec:
  dependsOn:
    - name: flux-operator
  interval: 1h
  path: ./kubernetes/main/apps/flux-system/instance/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster-flux-public
    namespace: flux-system
  targetNamespace: flux-system
  wait: false
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-instance-roots
spec:
  dependsOn:
    - name: flux-instance
  interval: 1h
  path: ./kubernetes/main/apps/flux-system/instance/roots
  prune: true
  sourceRef:
    kind: GitRepository
    name: cluster-flux-public
    namespace: flux-system
  targetNamespace: flux-system
  wait: false