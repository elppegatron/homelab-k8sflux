# cilium-cni-host-policy.yaml
apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "allow-cilium-cni-traffic"
spec:
  description: "Allowing essential node-to-node traffic for Cilium CNI health and operation"
  # This selects all nodes in the cluster
  nodeSelector: {}

  # Allow necessary ingress traffic to the node
  ingress:
    - fromEntities:
        - cluster # Allow traffic from within the cluster (Cilium-managed endpoints)
    - fromEntities:
        - remote-node # Allow traffic from other cluster nodes
      toPorts:
        - ports:
            - port: "8472" # VXLAN overlay
              protocol: UDP
            - port: "4240" # Cilium health checks
              protocol: TCP
            - port: "4244" # Hubble server (if enabled)
              protocol: TCP
    # Allow ICMP for network path validation
    - fromEntities:
        - remote-node
      icmps:
        - fields:
            - type: 8
              family: IPv4

  # Allow necessary egress traffic from the node
  egress:
    - toEntities:
        - cluster
    - toEntities:
        - remote-node
      toPorts:
        - ports:
            - port: "8472"
              protocol: UDP
            - port: "4240"
              protocol: TCP
            - port: "4244" # Hubble server (if enabled)
              protocol: TCP
    - toEntities:
        - remote-node
      icmps:
        - fields:
            - type: 8
              family: IPv4
    # Allow egress to the Kubernetes API server (CRITICAL)
    - toCIDR:
        - "192.168.122.2/32"
        - "192.168.122.3/32"
        - "192.168.122.4/32"
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # Allow egress to DNS (CRITICAL)
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": "kube-system"
            "k8s-app": "kube-dns"
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
        - ports:
            - port: "53"
              protocol: TCP